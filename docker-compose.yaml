services:
  gobang-app:
    container_name: gobang-app
    build:
      context: .
      dockerfile: docker/gobang-app/Dockerfile
    restart: always
    networks:
      - gobang-network
    ports:
      - ${APPPORT:-3000}:3000
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - gobang-auth

  gobang-auth:
    container_name: gobang-auth
    build:
      context: .
      dockerfile: docker/gobang-auth/Dockerfile
    restart: always
    networks:
      - gobang-network
    ports:
      - "${AUTHPORT:-8080}:${AUTHPORT:-8080}"
    environment:
      - TZ=Asia/Shanghai
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - gobang-db
  gobang-db:
    container_name: gobang-db
    image: mysql:latest
    restart: always
    networks:
      - gobang-network
    volumes:
      - gobang-db:/var/lib/mysql
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME:-gobang}

volumes:
  gobang-db:
    name: gobang-db
    driver: local

networks:
  gobang-network:
    name: gobang-network
    driver: bridge
