<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联机五子棋</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="auth-area">
    <h1>联机五子棋</h1>
    <input id="username" type="text" placeholder="用户名" autocomplete="username">
    <input id="password" type="password" placeholder="密码" autocomplete="current-password">
    <div class="btn-group">
      <button onclick="doLogin()">登录</button>
      <button onclick="doRegister()">注册</button>
    </div>
    <p id="auth-msg"></p>
  </div>

  <div id="game-area" style="display:none">
    <div class="game-header">
      <span id="status-text">等待操作...</span>
      <button id="match-btn" onclick="startMatch()">开始匹配</button>
    </div>
    <canvas id="canvas" width="480" height="480"></canvas>
  </div>
</div>
<script src="client.js"></script>
</body>
</html>
